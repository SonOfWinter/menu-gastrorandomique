name: Secret Scan

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""
